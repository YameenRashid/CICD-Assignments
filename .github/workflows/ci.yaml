name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  ci-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
    
      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: install dependencies
        run: pip install -r task-1/requirements.txt

      - name: run linting
        run: flake8 task-1
      
      - name: run unit tests
        run: pytest task-1

      - name: docker build check
        run: docker build -t test-image -f task-1/Dockerfile task-1